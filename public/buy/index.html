<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Twiqit · Buy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: helvetica, arial, system-ui, -apple-system, sans-serif;
      background: #304d44;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 16px;
    }
    .header {
      width: 100%; max-width: 520px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .logo-mark { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-circle {
      width: 36px; height: 36px; border-radius: 50%;
      background: #fff; border: 1px solid #cbd5e1;
      box-shadow: 0 4px 8px rgba(15,23,42,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: bold; letter-spacing: 0.1em;
      text-transform: uppercase; color: #933333;
    }
    .logo-text { font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: #fff; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .user-name { font-size: 12px; color: rgba(255,255,255,0.75); letter-spacing: 0.06em; }
    .btn-sign-out {
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(255,255,255,0.5); background: none; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px; padding: 4px 10px; cursor: pointer;
    }
    .btn-sign-out:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
    /* Twiq balance bar */
    .balance-bar {
      width: 100%; max-width: 520px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.08); border-radius: 10px;
      padding: 10px 16px; margin-bottom: 16px;
    }
    .balance-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
    .balance-amount { font-size: 18px; font-weight: 700; color: #fff; }
    .btn-watch-ad {
      padding: 7px 16px; border-radius: 7px; border: none; cursor: pointer;
      background: #933333; color: #fff; font-size: 12px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; transition: opacity 0.15s;
    }
    .btn-watch-ad:hover { opacity: 0.85; }
    .btn-watch-ad:disabled { opacity: 0.4; cursor: not-allowed; }
    .cooldown-msg { font-size: 11px; color: rgba(255,255,255,0.5); text-align: right; margin-top: 4px; }
    .card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.45);
      width: 100%; max-width: 520px; overflow: hidden;
    }
    .drop-image { width: 100%; height: 260px; object-fit: cover; display: block; }
    .card-body { padding: 28px 28px 32px; }
    .drop-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: #933333; margin-bottom: 6px; }
    .drop-name { font-size: 22px; font-weight: 700; color: #1a1a1a; margin: 0 0 8px; }
    .drop-desc { font-size: 14px; color: #555; line-height: 1.6; margin: 0 0 20px; }
    .drop-meta { display: flex; gap: 24px; margin-bottom: 24px; font-size: 13px; color: #666; }
    .drop-meta strong { display: block; font-size: 16px; color: #1a1a1a; }
    .empty-state { padding: 48px 28px; text-align: center; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-title { font-size: 20px; font-weight: 700; color: #304d44; margin: 0 0 8px; }
    .empty-sub { font-size: 14px; color: #888; margin: 0; }
    .loading { padding: 48px 28px; text-align: center; color: #aaa; font-size: 14px; }
    /* Username prompt */
    .signin-card { padding: 40px 32px; text-align: center; }
    .signin-title { font-size: 20px; font-weight: 700; color: #1a1a1a; margin: 0 0 8px; }
    .signin-sub { font-size: 14px; color: #888; margin: 0 0 24px; }
    .signin-input {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 1px solid #cbd5e1; font-size: 15px; margin-bottom: 12px; outline: none;
      text-align: center;
    }
    .signin-input:focus { border-color: #304d44; }
    .btn-signin {
      width: 100%; padding: 11px; border-radius: 8px; border: none;
      background: #304d44; color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; letter-spacing: 0.04em;
    }
    .btn-signin:hover { background: #253d35; }
    .btn-signin:disabled { opacity: 0.45; cursor: not-allowed; }
    .signin-error { font-size: 13px; color: #dc2626; margin-top: 10px; }
    .bid-row { display: flex; gap: 10px; align-items: center; margin-top: 4px; }
    .bid-input {
      flex: 1; padding: 9px 12px; border-radius: 8px;
      border: 1px solid #cbd5e1; font-size: 15px; outline: none;
      text-align: center;
    }
    .bid-input:focus { border-color: #304d44; }
    .btn-bid {
      padding: 9px 20px; border-radius: 8px; border: none; cursor: pointer;
      background: #304d44; color: #fff; font-size: 13px; font-weight: 600;
      letter-spacing: 0.04em; white-space: nowrap; transition: opacity 0.15s;
    }
    .btn-bid:hover { opacity: 0.85; }
    .btn-bid:disabled { opacity: 0.4; cursor: not-allowed; }
    .bid-feedback { font-size: 13px; margin-top: 8px; }
    .bid-feedback.success { color: #16a34a; }
    .bid-feedback.error   { color: #dc2626; }
    /* Twiq progress bar */
    .twiq-progress { margin-bottom: 20px; }
    .twiq-progress-header {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 6px;
    }
    .twiq-progress-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #888; }
    .twiq-progress-count { font-size: 14px; font-weight: 700; color: #1a1a1a; }
    .twiq-track {
      position: relative; height: 10px; background: #e2e8f0; border-radius: 99px; overflow: visible;
    }
    .twiq-fill {
      height: 100%; border-radius: 99px; background: #304d44;
      transition: width 0.4s ease; min-width: 0;
    }
    .twiq-fill.at-max { background: #933333; }
    /* min marker */
    .twiq-marker {
      position: absolute; top: -3px; width: 2px; height: 16px;
      background: #f59e0b; border-radius: 2px;
      transform: translateX(-50%);
    }
    .twiq-marker-label {
      position: absolute; top: 16px; transform: translateX(-50%);
      font-size: 10px; color: #f59e0b; white-space: nowrap; font-weight: 600;
    }
    .twiq-thresholds {
      display: flex; justify-content: space-between;
      margin-top: 18px; font-size: 12px; color: #888;
    }
    .twiq-thresholds span strong { color: #1a1a1a; font-size: 13px; }
    .raffle-closed-badge {
      display: inline-block; padding: 4px 10px; border-radius: 20px;
      background: #f1f5f9; color: #64748b; font-size: 11px;
      letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px;
    }
    .back-link {
      display: inline-block; margin-top: 20px;
      font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.6); text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 2px;
    }
    .back-link:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
  <div class="header">
    <a class="logo-mark" href="/">
      <div class="logo-circle">T</div>
      <span class="logo-text">Twiqit</span>
    </a>
    <div class="header-right" id="header-right"></div>
  </div>

  <div id="balance-bar-root"></div>

  <div class="card" id="card">
    <div class="loading">Loading…</div>
  </div>

  <a class="back-link" href="/">← Back to Twiqit</a>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const USER_KEY = 'twiqit_user';

    function getSavedUser() {
      try { return JSON.parse(localStorage.getItem(USER_KEY)); } catch { return null; }
    }
    function saveUser(u) { localStorage.setItem(USER_KEY, JSON.stringify(u)); }
    function clearUser() { localStorage.removeItem(USER_KEY); }

    function formatCurrency(cents) { return '$' + (cents / 100).toFixed(2); }
    function formatExpiry(dateStr) {
      return new Date(dateStr).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    // ---- Balance bar ----
    function BalanceBar({ user, externalBalance }) {
      const [balance, setBalance] = useState(null);
      const [cooldown, setCooldown] = useState(null); // ISO string of eligibleAt
      const [remaining, setRemaining] = useState(null);
      const [watching, setWatching] = useState(false);

      useEffect(() => {
        if (!user) return;
        fetch(`/buy/api/twiqs/balance?userId=${user.id}`)
          .then(r => r.json())
          .then(d => setBalance(d.balance ?? 0))
          .catch(() => setBalance(0));
      }, [user]);

      // Sync balance when a bid is placed externally
      useEffect(() => {
        if (externalBalance !== null && externalBalance !== undefined) {
          setBalance(externalBalance);
        }
      }, [externalBalance]);

      // Tick the countdown every second
      useEffect(() => {
        if (!cooldown) { setRemaining(null); return; }
        function tick() {
          const ms = new Date(cooldown) - Date.now();
          if (ms <= 0) { setCooldown(null); setRemaining(null); return; }
          const m = Math.floor(ms / 60000);
          const s = Math.floor((ms % 60000) / 1000);
          setRemaining(`${m}m ${String(s).padStart(2,'0')}s`);
        }
        tick();
        const id = setInterval(tick, 1000);
        return () => clearInterval(id);
      }, [cooldown]);

      async function watchAd() {
        setWatching(true);
        try {
          const r = await fetch('/buy/api/twiqs/watch-ad', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: user.id }),
          });
          const data = await r.json();
          if (r.status === 429) { setCooldown(data.error.eligibleAt); setWatching(false); return; }
          if (r.ok) { setBalance(data.balance); setCooldown(null); }
        } catch { /* ignore */ }
        setWatching(false);
      }

      const onCooldown = !!remaining;

      const el = document.getElementById('balance-bar-root');
      if (!el || !user || balance === null) return null;
      return ReactDOM.createPortal(
        <div className="balance-bar">
          <div>
            <div className="balance-label">Your Twiqs</div>
            <div className="balance-amount">{balance}</div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <button className="btn-watch-ad" onClick={watchAd} disabled={watching || onCooldown}>
              {watching ? 'Loading…' : onCooldown ? 'Ad watched' : '▶ Watch Ad +100'}
            </button>
            {onCooldown && <div className="cooldown-msg">Next ad in {remaining}</div>}
          </div>
        </div>,
        el
      );
    }

    // ---- Header portal ----
    function Header({ user, onSignOut }) {
      const el = document.getElementById('header-right');
      if (!el || !user) return null;
      return ReactDOM.createPortal(
        <>
          <span className="user-name">{user.displayName}</span>
          <button className="btn-sign-out" onClick={onSignOut}>Change</button>
        </>,
        el
      );
    }

    // ---- Username prompt ----
    function UsernamePrompt({ onSuccess }) {
      const [name, setName] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      async function handleSubmit(e) {
        e.preventDefault();
        const trimmed = name.trim();
        if (!trimmed) return;
        setLoading(true); setError('');
        try {
          const r = await fetch('/buy/api/auth/guest', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ displayName: trimmed }),
          });
          const data = await r.json();
          if (!r.ok) { setError(data?.error?.message || 'Something went wrong.'); setLoading(false); return; }
          saveUser(data);
          onSuccess(data);
        } catch { setError('Connection error. Try again.'); }
        setLoading(false);
      }

      return (
        <div className="signin-card">
          <p className="signin-title">Welcome to Twiqit</p>
          <p className="signin-sub">What should we call you?</p>
          <form onSubmit={handleSubmit}>
            <input
              className="signin-input"
              type="text"
              placeholder="Your name"
              maxLength={32}
              value={name}
              onChange={e => setName(e.target.value)}
              autoFocus
            />
            <button className="btn-signin" type="submit" disabled={loading || !name.trim()}>
              {loading ? 'Just a sec…' : 'Let\'s go →'}
            </button>
            {error && <p className="signin-error">{error}</p>}
          </form>
        </div>
      );
    }

    // ---- Twiq progress bar ----
    function TwiqProgress({ total, min, max }) {
      const pct = max > 0 ? Math.min((total / max) * 100, 100) : 0;
      const minPct = max > 0 ? Math.min((min / max) * 100, 100) : 0;
      const atMax = total >= max;
      return (
        <div className="twiq-progress">
          <div className="twiq-progress-header">
            <span className="twiq-progress-label">Twiqs Bid</span>
            <span className="twiq-progress-count">{total.toLocaleString()} / {max.toLocaleString()}</span>
          </div>
          <div className="twiq-track">
            <div className={`twiq-fill${atMax ? ' at-max' : ''}`} style={{ width: `${pct}%` }} />
            {/* Min threshold marker */}
            <div className="twiq-marker" style={{ left: `${minPct}%` }}>
              <div className="twiq-marker-label">min</div>
            </div>
          </div>
          <div className="twiq-thresholds">
            <span>Min to close: <strong>{min.toLocaleString()}</strong></span>
            <span>Max (instant close): <strong>{max.toLocaleString()}</strong></span>
          </div>
        </div>
      );
    }

    // ---- Drop display ----
    function DropCard({ drop, raffle, user, onBidSuccess }) {
      const [bidAmount, setBidAmount] = useState('');
      const [bidding, setBidding] = useState(false);
      const [feedback, setFeedback] = useState(null);
      const [totalBid, setTotalBid] = useState(raffle.totalTwiqsBid ?? 0);

      const isActive = raffle.status === 'active';

      async function placeBid(e) {
        e.preventDefault();
        const amount = parseInt(bidAmount, 10);
        if (!amount || amount <= 0) return;
        setBidding(true); setFeedback(null);
        try {
          const r = await fetch(`/buy/api/raffle/${raffle.id}/bid`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: user.id, amount }),
          });
          const data = await r.json();
          if (!r.ok) {
            const msg = data?.error?.message || 'Something went wrong.';
            setFeedback({ type: 'error', msg });
          } else {
            setFeedback({ type: 'success', msg: `Bid placed! New balance: ${data.balance} Twiqs` });
            setBidAmount('');
            setTotalBid(data.raffle?.totalTwiqsBid ?? totalBid + amount);
            onBidSuccess(data.balance);
          }
        } catch {
          setFeedback({ type: 'error', msg: 'Connection error. Try again.' });
        }
        setBidding(false);
      }

      return (
        <>
          {drop.imageUrl && <img className="drop-image" src={drop.imageUrl} alt={drop.name} />}
          <div className="card-body">
            <p className="drop-label">Active Drop</p>
            <h1 className="drop-name">{drop.name}</h1>
            <p className="drop-desc">{drop.description}</p>
            <div className="drop-meta">
              <div><strong>{formatCurrency(drop.retailValue)}</strong>Retail Value</div>
              <div><strong>{formatExpiry(raffle.expiresAt)}</strong>Raffle Closes</div>
            </div>
            <TwiqProgress
              total={totalBid}
              min={raffle.minTwiqThreshold}
              max={raffle.maxTwiqThreshold}
            />
            {isActive ? (
              <form onSubmit={placeBid}>
                <div className="bid-row">
                  <input
                    className="bid-input"
                    type="number"
                    min="1"
                    step="1"
                    placeholder="Twiqs to bid"
                    value={bidAmount}
                    onChange={e => setBidAmount(e.target.value)}
                  />
                  <button className="btn-bid" type="submit" disabled={bidding || !bidAmount}>
                    {bidding ? 'Placing…' : 'Place Bid'}
                  </button>
                </div>
                {feedback && (
                  <p className={`bid-feedback ${feedback.type}`}>{feedback.msg}</p>
                )}
              </form>
            ) : (
              <span className="raffle-closed-badge">Raffle Closed</span>
            )}
          </div>
        </>
      );
    }

    function EmptyState() {
      return (
        <div className="empty-state">
          <div className="empty-icon">🎁</div>
          <h2 className="empty-title">No drop right now</h2>
          <p className="empty-sub">Check back soon — something good is coming.</p>
        </div>
      );
    }

    // ---- App ----
    function App() {
      const [user, setUser] = useState(getSavedUser);
      const [drop, setDrop] = useState({ status: 'loading', data: null });
      const [bidBalance, setBidBalance] = useState(null);

      useEffect(() => {
        fetch('/buy/api/raffle/active')
          .then(r => r.json())
          .then(data => setDrop({ status: 'done', data }))
          .catch(() => setDrop({ status: 'done', data: null }));
      }, []);

      function handleSignOut() { clearUser(); setUser(null); }
      function handleSignIn(u) { setUser(u); }

      if (drop.status === 'loading') {
        return <div className="loading">Loading…</div>;
      }

      if (!user) {
        return <UsernamePrompt onSuccess={handleSignIn} />;
      }

      return (
        <>
          <Header user={user} onSignOut={handleSignOut} />
          <BalanceBar user={user} externalBalance={bidBalance} />
          {drop.data
            ? <DropCard
                drop={drop.data.drop}
                raffle={drop.data.raffle}
                user={user}
                onBidSuccess={bal => setBidBalance(bal)}
              />
            : <EmptyState />}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('card'));
    root.render(<App />);
  </script>
</body>
</html>

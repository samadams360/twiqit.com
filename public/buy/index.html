<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Twiqit · Buy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: helvetica, arial, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #304d44;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }
    .header {
      width: 100%;
      max-width: 520px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .logo-mark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .logo-circle {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid #cbd5e1;
      box-shadow: 0 4px 8px rgba(15,23,42,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: bold;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: #933333;
    }
    .logo-text { font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: #fff; }
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.45);
      width: 100%;
      max-width: 520px;
      overflow: hidden;
    }
    .drop-image {
      width: 100%; height: 260px;
      object-fit: cover;
      display: block;
    }
    .card-body { padding: 28px 28px 32px; }
    .drop-label {
      font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
      color: #933333; margin-bottom: 6px;
    }
    .drop-name { font-size: 22px; font-weight: 700; color: #1a1a1a; margin: 0 0 8px; }
    .drop-desc { font-size: 14px; color: #555; line-height: 1.6; margin: 0 0 20px; }
    .drop-meta {
      display: flex; gap: 24px; margin-bottom: 24px;
      font-size: 13px; color: #666;
    }
    .drop-meta strong { display: block; font-size: 16px; color: #1a1a1a; }
    .empty-state { padding: 48px 28px; text-align: center; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-title { font-size: 20px; font-weight: 700; color: #304d44; margin: 0 0 8px; }
    .empty-sub { font-size: 14px; color: #888; margin: 0; }
    .loading { padding: 48px 28px; text-align: center; color: #aaa; font-size: 14px; }
    .back-link {
      display: inline-block; margin-top: 20px;
      font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.6); text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 2px;
    }
    .back-link:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
  <div class="header">
    <a class="logo-mark" href="/">
      <div class="logo-circle">T</div>
      <span class="logo-text">Twiqit</span>
    </a>
  </div>

  <div class="card" id="card">
    <div class="loading">Loading drop…</div>
  </div>

  <a class="back-link" href="/">← Back to Twiqit</a>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function formatCurrency(cents) {
      return '$' + (cents / 100).toFixed(2);
    }

    function formatExpiry(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function DropCard({ drop, raffle }) {
      return (
        <>
          {drop.imageUrl && (
            <img className="drop-image" src={drop.imageUrl} alt={drop.name} />
          )}
          <div className="card-body">
            <p className="drop-label">Active Drop</p>
            <h1 className="drop-name">{drop.name}</h1>
            <p className="drop-desc">{drop.description}</p>
            <div className="drop-meta">
              <div>
                <strong>{formatCurrency(drop.retailValue)}</strong>
                Retail Value
              </div>
              <div>
                <strong>{formatExpiry(raffle.expiresAt)}</strong>
                Raffle Closes
              </div>
            </div>
          </div>
        </>
      );
    }

    function EmptyState() {
      return (
        <div className="empty-state">
          <div className="empty-icon">🎁</div>
          <h2 className="empty-title">No drop right now</h2>
          <p className="empty-sub">Check back soon — something good is coming.</p>
        </div>
      );
    }

    function App() {
      const [state, setState] = useState({ status: 'loading', data: null });

      useEffect(() => {
        fetch('/buy/api/raffle/active')
          .then(r => r.json())
          .then(data => setState({ status: 'done', data }))
          .catch(() => setState({ status: 'done', data: null }));
      }, []);

      if (state.status === 'loading') {
        return <div className="loading">Loading drop…</div>;
      }

      if (!state.data) {
        return <EmptyState />;
      }

      return <DropCard drop={state.data.drop} raffle={state.data.raffle} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('card'));
    root.render(<App />);
  </script>
</body>
</html>

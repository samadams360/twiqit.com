<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Twiqit · Buy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: helvetica, arial, system-ui, -apple-system, sans-serif;
      background: #304d44;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 16px;
    }
    .header {
      width: 100%; max-width: 520px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .logo-mark { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-circle {
      width: 36px; height: 36px; border-radius: 50%;
      background: #fff; border: 1px solid #cbd5e1;
      box-shadow: 0 4px 8px rgba(15,23,42,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: bold; letter-spacing: 0.1em;
      text-transform: uppercase; color: #933333;
    }
    .logo-text { font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: #fff; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .user-name { font-size: 12px; color: rgba(255,255,255,0.75); letter-spacing: 0.06em; }
    .btn-sign-out {
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(255,255,255,0.5); background: none; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px; padding: 4px 10px; cursor: pointer;
    }
    .btn-sign-out:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
    /* Twiq balance bar */
    .balance-bar {
      width: 100%; max-width: 520px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.08); border-radius: 10px;
      padding: 10px 16px; margin-bottom: 16px;
    }
    .balance-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
    .balance-amount { font-size: 18px; font-weight: 700; color: #fff; }
    .btn-watch-ad {
      padding: 7px 16px; border-radius: 7px; border: none; cursor: pointer;
      background: #933333; color: #fff; font-size: 12px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; transition: opacity 0.15s;
    }
    .btn-watch-ad:hover { opacity: 0.85; }
    .btn-watch-ad:disabled { opacity: 0.4; cursor: not-allowed; }
    .cooldown-msg { font-size: 11px; color: rgba(255,255,255,0.5); text-align: right; margin-top: 4px; }
    .card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.45);
      width: 100%; max-width: 520px; overflow: hidden;
    }
    .drop-image { width: 100%; height: 260px; object-fit: cover; display: block; }
    .card-body { padding: 28px 28px 32px; }
    .drop-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: #933333; margin-bottom: 6px; }
    .drop-name { font-size: 22px; font-weight: 700; color: #1a1a1a; margin: 0 0 8px; }
    .drop-desc { font-size: 14px; color: #555; line-height: 1.6; margin: 0 0 20px; }
    .drop-meta { display: flex; gap: 24px; margin-bottom: 24px; font-size: 13px; color: #666; }
    .drop-meta strong { display: block; font-size: 16px; color: #1a1a1a; }
    .empty-state { padding: 48px 28px; text-align: center; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-title { font-size: 20px; font-weight: 700; color: #304d44; margin: 0 0 8px; }
    .empty-sub { font-size: 14px; color: #888; margin: 0; }
    .loading { padding: 48px 28px; text-align: center; color: #aaa; font-size: 14px; }
    /* Username prompt */
    .signin-card { padding: 40px 32px; text-align: center; }
    .signin-title { font-size: 20px; font-weight: 700; color: #1a1a1a; margin: 0 0 8px; }
    .signin-sub { font-size: 14px; color: #888; margin: 0 0 24px; }
    .signin-input {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 1px solid #cbd5e1; font-size: 15px; margin-bottom: 12px; outline: none;
      text-align: center;
    }
    .signin-input:focus { border-color: #304d44; }
    .btn-signin {
      width: 100%; padding: 11px; border-radius: 8px; border: none;
      background: #304d44; color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; letter-spacing: 0.04em;
    }
    .btn-signin:hover { background: #253d35; }
    .btn-signin:disabled { opacity: 0.45; cursor: not-allowed; }
    .signin-error { font-size: 13px; color: #dc2626; margin-top: 10px; }
    .bid-row { display: flex; gap: 10px; align-items: center; margin-top: 4px; }
    .bid-input {
      flex: 1; padding: 9px 12px; border-radius: 8px;
      border: 1px solid #cbd5e1; font-size: 15px; outline: none;
      text-align: center;
    }
    .bid-input:focus { border-color: #304d44; }
    .btn-bid {
      padding: 9px 20px; border-radius: 8px; border: none; cursor: pointer;
      background: #304d44; color: #fff; font-size: 13px; font-weight: 600;
      letter-spacing: 0.04em; white-space: nowrap; transition: opacity 0.15s;
    }
    .btn-bid:hover { opacity: 0.85; }
    .btn-bid:disabled { opacity: 0.4; cursor: not-allowed; }
    .bid-feedback { font-size: 13px; margin-top: 8px; }
    .bid-feedback.success { color: #16a34a; }
    .bid-feedback.error   { color: #dc2626; }
    /* Twiq progress bar */
    .twiq-progress { margin-bottom: 20px; }
    .twiq-progress-header {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 6px;
    }
    .twiq-progress-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #888; }
    .twiq-progress-count { font-size: 14px; font-weight: 700; color: #1a1a1a; }
    .twiq-track {
      position: relative; height: 10px; background: #e2e8f0; border-radius: 99px; overflow: visible;
    }
    .twiq-fill {
      height: 100%; border-radius: 99px; background: #304d44;
      transition: width 0.4s ease; min-width: 0;
    }
    .twiq-fill.at-max { background: #933333; }
    /* min marker */
    .twiq-marker {
      position: absolute; top: -3px; width: 2px; height: 16px;
      background: #f59e0b; border-radius: 2px;
      transform: translateX(-50%);
    }
    .twiq-marker-label {
      position: absolute; top: 16px; transform: translateX(-50%);
      font-size: 10px; color: #f59e0b; white-space: nowrap; font-weight: 600;
    }
    .twiq-thresholds {
      display: flex; justify-content: space-between;
      margin-top: 18px; font-size: 12px; color: #888;
    }
    .twiq-thresholds span strong { color: #1a1a1a; font-size: 13px; }
    .raffle-closed-badge {
      display: inline-block; padding: 4px 10px; border-radius: 20px;
      background: #f1f5f9; color: #64748b; font-size: 11px;
      letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px;
    }
    /* Winner banner — slim strip */
    .winner-strip {
      width: 100%; max-width: 520px;
      background: #f59e0b; border-radius: 10px;
      padding: 10px 16px; margin-bottom: 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .winner-strip-text { font-size: 13px; font-weight: 600; color: #1a1a1a; }
    .btn-confirm {
      padding: 7px 16px; border-radius: 7px; border: none; cursor: pointer;
      background: #304d44; color: #fff; font-size: 12px; font-weight: 600;
      letter-spacing: 0.04em; white-space: nowrap; transition: opacity 0.15s;
    }
    .btn-confirm:hover { opacity: 0.85; }
    .btn-confirm:disabled { opacity: 0.4; cursor: not-allowed; }
    .back-link {
      display: inline-block; margin-top: 20px;
      font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.6); text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 2px;
    }
    .back-link:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
    /* Profile page */
    .profile-card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.45);
      width: 100%; max-width: 520px; padding: 32px 28px;
    }
    .profile-title { font-size: 20px; font-weight: 700; color: #1a1a1a; margin: 0 0 6px; }
    .profile-sub { font-size: 14px; color: #888; margin: 0 0 24px; }
    .profile-field { margin-bottom: 18px; }
    .profile-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #888; margin-bottom: 5px; }
    .profile-input {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 1px solid #cbd5e1; font-size: 15px; outline: none;
    }
    .profile-input:focus { border-color: #304d44; }
    .btn-profile-save {
      width: 100%; padding: 11px; border-radius: 8px; border: none;
      background: #304d44; color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; letter-spacing: 0.04em; margin-top: 4px;
    }
    .btn-profile-save:hover { background: #253d35; }
    .btn-profile-save:disabled { opacity: 0.45; cursor: not-allowed; }
    .profile-feedback { font-size: 13px; margin-top: 10px; }
    .profile-feedback.success { color: #16a34a; }
    .profile-feedback.error { color: #dc2626; }
    .btn-cashout {
      padding: 7px 14px; border-radius: 7px; border: none; cursor: pointer;
      background: rgba(255,255,255,0.15); color: #fff; font-size: 12px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; transition: opacity 0.15s; margin-top: 6px;
    }
    .btn-cashout:hover { opacity: 0.8; }
    .btn-cashout:disabled { opacity: 0.4; cursor: not-allowed; }
    .profile-link {
      font-size: 11px; color: rgba(255,255,255,0.5); cursor: pointer;
      text-decoration: underline; margin-top: 4px; display: inline-block;
    }
    .profile-link:hover { color: rgba(255,255,255,0.8); }
    /* Win history / raffle history */
    .win-history { margin-top: 28px; }
    .win-history-title {
      font-size: 13px; font-weight: 700; color: #1a1a1a; margin: 0 0 12px;
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .history-controls {
      display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap;
    }
    .history-sort-label { font-size: 11px; color: #888; letter-spacing: 0.08em; text-transform: uppercase; }
    .history-sort-btn {
      font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid #cbd5e1;
      background: #fff; color: #555; cursor: pointer; transition: all 0.15s;
    }
    .history-sort-btn.active { background: #304d44; color: #fff; border-color: #304d44; }
    .win-row {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px;
    }
    .win-row:last-child { border-bottom: none; }
    .win-row-info { flex: 1; min-width: 0; }
    .win-row-name { font-weight: 600; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .win-row-meta { font-size: 11px; color: #aaa; margin-top: 2px; }
    .win-row-id {
      font-size: 10px; color: #bbb; margin-top: 3px; cursor: pointer;
      font-family: monospace; letter-spacing: 0.04em;
    }
    .win-row-id:hover { color: #304d44; }
    .win-row-status {
      font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 20px; white-space: nowrap;
    }
    .win-row-status.winner_selected { background: #fef3c7; color: #92400e; }
    .win-row-status.receipt_confirmed { background: #dcfce7; color: #16a34a; }
    .win-row-status.active { background: #dbeafe; color: #1e40af; }
    .win-row-status.closed { background: #f1f5f9; color: #64748b; }    .win-row-confirm {
      padding: 5px 12px; border-radius: 6px; border: none; cursor: pointer;
      background: #304d44; color: #fff; font-size: 11px; font-weight: 600;
      white-space: nowrap; transition: opacity 0.15s;
    }
    .win-row-confirm:hover { opacity: 0.85; }
    .win-row-confirm:disabled { opacity: 0.4; cursor: not-allowed; }
    .outstanding-section {
      background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px;
      padding: 14px 16px; margin-bottom: 20px;
    }
    .outstanding-title {
      font-size: 12px; font-weight: 700; color: #92400e;
      letter-spacing: 0.08em; text-transform: uppercase; margin: 0 0 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <a class="logo-mark" id="logo-link" href="/">
      <div class="logo-circle">T</div>
      <span class="logo-text">Twiqit</span>
    </a>
    <div class="header-right" id="header-right"></div>
  </div>

  <div id="balance-bar-root"></div>

  <div class="card" id="card">
    <div class="loading">Loading…</div>
  </div>

  <a class="back-link" href="/buy">← Back to Twiqit Commerce</a>

  <script src="/buy/vendor/react.production.min.js"></script>
  <script src="/buy/vendor/react-dom.production.min.js"></script>
  <script src="/buy/vendor/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const USER_KEY = 'twiqit_user';

    function getSavedUser() {
      try { return JSON.parse(localStorage.getItem(USER_KEY)); } catch { return null; }
    }
    function saveUser(u) { localStorage.setItem(USER_KEY, JSON.stringify(u)); }
    function clearUser() { localStorage.removeItem(USER_KEY); }

    function formatCurrency(cents) { return '$' + (cents / 100).toFixed(2); }
    function formatExpiry(dateStr) {
      return new Date(dateStr).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    // ---- Telemetry ----
    const SESSION_ID = Math.random().toString(36).slice(2);
    function telemetry(type, data = {}) {
      const user = getSavedUser();
      fetch('/buy/api/telemetry/event', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type, userId: user?.id ?? null, sessionId: SESSION_ID, data }),
      }).catch(() => {});
    }
    // Global JS error capture
    window.addEventListener('error', e => {
      telemetry('js_error', { message: e.message, source: e.filename, line: e.lineno });
    });

    // ---- Balance bar ----
    function BalanceBar({ user, externalBalance, onCashout, onProfile }) {
      const [balance, setBalance] = useState(null);
      const [cooldown, setCooldown] = useState(null);
      const [remaining, setRemaining] = useState(null);
      const [watching, setWatching] = useState(false);
      const [cashingOut, setCashingOut] = useState(false);
      const [cashoutMsg, setCashoutMsg] = useState(null);

      useEffect(() => {
        if (!user) return;
        fetch(`/buy/api/twiqs/balance?userId=${user.id}`)
          .then(r => r.json())
          .then(d => setBalance(d.balance ?? 0))
          .catch(() => setBalance(0));
      }, [user]);

      // Sync balance when a bid is placed externally
      useEffect(() => {
        if (externalBalance !== null && externalBalance !== undefined) {
          setBalance(externalBalance);
        }
      }, [externalBalance]);

      // Tick the countdown every second
      useEffect(() => {
        if (!cooldown) { setRemaining(null); return; }
        function tick() {
          const ms = new Date(cooldown) - Date.now();
          if (ms <= 0) { setCooldown(null); setRemaining(null); return; }
          const m = Math.floor(ms / 60000);
          const s = Math.floor((ms % 60000) / 1000);
          setRemaining(`${m}m ${String(s).padStart(2,'0')}s`);
        }
        tick();
        const id = setInterval(tick, 1000);
        return () => clearInterval(id);
      }, [cooldown]);

      async function watchAd() {
        setWatching(true);
        try {
          const r = await fetch('/buy/api/twiqs/watch-ad', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: user.id }),
          });
          const data = await r.json();
          if (r.status === 429) { setCooldown(data.error.eligibleAt); setWatching(false); return; }
          if (r.ok) { setBalance(data.balance); setCooldown(null); telemetry('ad_watch_start'); }
        } catch { /* ignore */ }
        setWatching(false);
      }

      async function cashOut() {
        setCashingOut(true); setCashoutMsg(null);
        try {
          const r = await fetch('/buy/api/twiqs/cashout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: user.id }),
          });
          const data = await r.json();
          if (!r.ok) {
            if (data?.error?.code === 'NO_PAYMENT_HANDLE') {
              setCashoutMsg({ type: 'error', msg: 'Set your Venmo handle in your profile first.' });
              onProfile && onProfile();
            } else {
              setCashoutMsg({ type: 'error', msg: data?.error?.message || 'Cashout failed.' });
            }
          } else {
            setCashoutMsg({ type: 'success', msg: data.message });
          }
        } catch { setCashoutMsg({ type: 'error', msg: 'Connection error.' }); }
        setCashingOut(false);
      }

      const onCooldown = !!remaining;

      const el = document.getElementById('balance-bar-root');
      if (!el || !user || balance === null) return null;
      return ReactDOM.createPortal(
        <div className="balance-bar">
          <div>
            <div className="balance-label">Your Twiqs</div>
            <div className="balance-amount">{balance}</div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <button className="btn-watch-ad" onClick={watchAd} disabled={watching || onCooldown}>
              {watching ? 'Loading…' : onCooldown ? 'Ad watched' : '▶ Watch Ad +100'}
            </button>
            {onCooldown && <div className="cooldown-msg">Next ad in {remaining}</div>}
            {cashoutMsg && (
              <div className="cooldown-msg" style={{ color: cashoutMsg.type === 'error' ? '#fca5a5' : '#86efac', maxWidth: '200px' }}>
                {cashoutMsg.msg}
              </div>
            )}
          </div>
        </div>,
        el
      );
    }

    function Header({ user, onSignOut, onProfile, onHome }) {
      const el = document.getElementById('header-right');
      const logo = document.getElementById('logo-link');

      // Point logo to /buy when in the buy app, / otherwise
      useEffect(() => {
        if (logo) logo.href = onHome ? '/buy' : '/';
      }, [onHome]);

      if (!el || !user) return null;
      return ReactDOM.createPortal(
        <>
          <span className="user-name" onClick={onProfile} style={{ cursor: 'pointer', textDecoration: 'underline' }}>{user.displayName}</span>
          <button className="btn-sign-out" onClick={onSignOut}>Change</button>
        </>,
        el
      );
    }

    // ---- Username prompt ----
    function UsernamePrompt({ onSuccess }) {
      const [name, setName] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      async function handleSubmit(e) {
        e.preventDefault();
        const trimmed = name.trim();
        if (!trimmed) return;
        setLoading(true); setError('');
        try {
          const r = await fetch('/buy/api/auth/guest', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ displayName: trimmed }),
          });
          const data = await r.json();
          if (!r.ok) { setError(data?.error?.message || 'Something went wrong.'); setLoading(false); return; }
          saveUser(data);
          telemetry('user_registered', { displayName: data.displayName });
          onSuccess(data);
        } catch { setError('Connection error. Try again.'); }
        setLoading(false);
      }

      return (
        <div className="signin-card">
          <p className="signin-title">Welcome to Twiqit</p>
          <p className="signin-sub">What should we call you?</p>
          <form onSubmit={handleSubmit}>
            <input
              className="signin-input"
              type="text"
              placeholder="Your name"
              maxLength={32}
              value={name}
              onChange={e => setName(e.target.value)}
              autoFocus
            />
            <button className="btn-signin" type="submit" disabled={loading || !name.trim()}>
              {loading ? 'Just a sec…' : 'Let\'s go →'}
            </button>
            {error && <p className="signin-error">{error}</p>}
          </form>
        </div>
      );
    }

    // ---- Winner banner — slim strip, only for outstanding wins ----
    function WinnerBanner({ user, winRaffle, onConfirmed }) {
      const [confirming, setConfirming] = useState(false);

      // Only show for unconfirmed wins
      if (winRaffle.status !== 'winner_selected') return null;

      async function confirmReceipt() {
        setConfirming(true);
        try {
          const r = await fetch(`/buy/api/raffle/${winRaffle.id}/confirm-receipt`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: user.id }),
          });
          if (r.ok) { onConfirmed && onConfirmed(); }
        } catch { /* ignore */ }
        setConfirming(false);
      }

      return (
        <div className="winner-strip">
          <span className="winner-strip-text">🏆 You won {winRaffle.dropName}</span>
          <button className="btn-confirm" onClick={confirmReceipt} disabled={confirming}>
            {confirming ? 'Confirming…' : 'Confirm Receipt'}
          </button>
        </div>
      );
    }

    // ---- Twiq progress bar ----
    function TwiqProgress({ total, min, max }) {
      const pct = max > 0 ? Math.min((total / max) * 100, 100) : 0;
      const minPct = max > 0 ? Math.min((min / max) * 100, 100) : 0;
      const atMax = total >= max;
      return (
        <div className="twiq-progress">
          <div className="twiq-progress-header">
            <span className="twiq-progress-label">Twiqs Bid</span>
            <span className="twiq-progress-count">{total.toLocaleString()} / {max.toLocaleString()}</span>
          </div>
          <div className="twiq-track">
            <div className={`twiq-fill${atMax ? ' at-max' : ''}`} style={{ width: `${pct}%` }} />
            {/* Min threshold marker */}
            <div className="twiq-marker" style={{ left: `${minPct}%` }}>
              <div className="twiq-marker-label">min</div>
            </div>
          </div>
          <div className="twiq-thresholds">
            <span>Min to close: <strong>{min.toLocaleString()}</strong></span>
            <span>Max (instant close): <strong>{max.toLocaleString()}</strong></span>
          </div>
        </div>
      );
    }

    // ---- Drop display ----
    function DropCard({ drop, raffle, user, onBidSuccess }) {
      const [bidAmount, setBidAmount] = useState('');
      const [bidding, setBidding] = useState(false);
      const [feedback, setFeedback] = useState(null);
      const [totalBid, setTotalBid] = useState(raffle.totalTwiqsBid ?? 0);
      const [myBids, setMyBids] = useState(null);

      const isActive = raffle.status === 'active';

      // Fetch user's personal bid total on mount
      useEffect(() => {
        if (!user) return;
        fetch(`/buy/api/raffle/${raffle.id}/my-bids?userId=${user.id}`)
          .then(r => r.json())
          .then(d => setMyBids(d.totalBid ?? 0))
          .catch(() => setMyBids(0));
      }, [user, raffle.id]);

      async function placeBid(e) {
        e.preventDefault();
        const amount = parseInt(bidAmount, 10);
        if (!amount || amount <= 0) return;
        setBidding(true); setFeedback(null);
        try {
          const r = await fetch(`/buy/api/raffle/${raffle.id}/bid`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: user.id, amount }),
          });
          const data = await r.json();
          if (!r.ok) {
            const msg = data?.error?.message || 'Something went wrong.';
            setFeedback({ type: 'error', msg });
          } else {
            setFeedback({ type: 'success', msg: `Bid placed! New balance: ${data.balance} Twiqs` });
            setBidAmount('');
            setTotalBid(data.raffle?.totalTwiqsBid ?? totalBid + amount);
            setMyBids(prev => (prev ?? 0) + amount);
            telemetry('bid_placed', { raffleId: raffle.id, amount });
            onBidSuccess(data.balance);
          }
        } catch {
          setFeedback({ type: 'error', msg: 'Connection error. Try again.' });
        }
        setBidding(false);
      }

      return (
        <>
          {drop.imageUrl && <img className="drop-image" src={drop.imageUrl} alt={drop.name} />}
          <div className="card-body">
            <p className="drop-label">{isActive ? 'Active Product' : 'Past Product'}</p>
            <h1 className="drop-name">{drop.name}</h1>
            <p className="drop-desc">{drop.description}</p>
            <div className="drop-meta">
              <div><strong>{formatCurrency(drop.retailValue)}</strong>Retail Value</div>
              <div><strong>{formatExpiry(raffle.expiresAt)}</strong>Raffle Closes</div>
              {raffle.creatorName && (
                <div><strong>{raffle.creatorName}</strong>Hosted by</div>
              )}
              {myBids !== null && (
                <div><strong>{myBids.toLocaleString()}</strong>Your Twiqs Bid</div>
              )}
            </div>
            <TwiqProgress
              total={totalBid}
              min={raffle.minTwiqThreshold}
              max={raffle.maxTwiqThreshold}
            />
            {isActive ? (
              <form onSubmit={placeBid}>
                <div className="bid-row">
                  <input
                    className="bid-input"
                    type="number"
                    min="1"
                    step="1"
                    placeholder="Twiqs to bid"
                    value={bidAmount}
                    onChange={e => setBidAmount(e.target.value)}
                  />
                  <button className="btn-bid" type="submit" disabled={bidding || !bidAmount}>
                    {bidding ? 'Placing…' : 'Place Bid'}
                  </button>
                </div>
                {feedback && (
                  <p className={`bid-feedback ${feedback.type}`}>{feedback.msg}</p>
                )}
              </form>
            ) : (
              <div>
                <span className="raffle-closed-badge">Raffle Closed</span>
                {raffle.winnerName && (
                  <span style={{ marginLeft: '10px', fontSize: '13px', color: '#555' }}>
                    🏆 Won by <strong>{raffle.winnerName}</strong>
                  </span>
                )}
              </div>
            )}
          </div>
        </>
      );
    }

    function EmptyState() {
      return (
        <div className="empty-state">
          <div className="empty-icon">🎁</div>
          <h2 className="empty-title">No product right now</h2>
          <p className="empty-sub">Check back soon — something good is coming.</p>
        </div>
      );
    }

    // ---- Profile page ----
    function ProfilePage({ user, onBack }) {
      const [handle, setHandle] = useState('');
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [feedback, setFeedback] = useState(null);
      const [history, setHistory] = useState(null);
      const [sortBy, setSortBy] = useState('date'); // 'date' | 'status'
      const [sortDir, setSortDir] = useState('desc'); // 'asc' | 'desc'

      useEffect(() => {
        fetch(`/buy/api/user/profile?userId=${user.id}`)
          .then(r => r.json())
          .then(d => { setHandle(d.venmoHandle || ''); setLoading(false); })
          .catch(() => setLoading(false));
        fetch(`/buy/api/raffle/my-history?userId=${user.id}`)
          .then(r => r.json())
          .then(d => setHistory(Array.isArray(d) ? d : []))
          .catch(() => setHistory([]));
      }, [user.id]);

      async function save(e) {
        e.preventDefault();
        setSaving(true); setFeedback(null);
        try {
          const r = await fetch('/buy/api/user/payment-handle', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: user.id, venmoHandle: handle }),
          });
          const data = await r.json();
          if (!r.ok) { setFeedback({ type: 'error', msg: data?.error?.message || 'Failed to save.' }); }
          else { setFeedback({ type: 'success', msg: 'Venmo handle saved.' }); }
        } catch { setFeedback({ type: 'error', msg: 'Connection error.' }); }
        setSaving(false);
      }

      async function confirmWin(raffleId) {
        try {
          const r = await fetch(`/buy/api/raffle/${raffleId}/confirm-receipt`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: user.id }),
          });
          if (r.ok) {
            setHistory(prev => prev.map(w =>
              w.id === raffleId ? { ...w, status: 'receipt_confirmed' } : w
            ));
          }
        } catch { /* ignore */ }
      }

      function toggleSort(field) {
        if (sortBy === field) {
          setSortDir(d => d === 'asc' ? 'desc' : 'asc');
        } else {
          setSortBy(field);
          setSortDir('desc');
        }
      }

      const STATUS_ORDER = { winner_selected: 0, active: 1, receipt_confirmed: 2, closed: 3 };

      const sorted = history ? [...history].sort((a, b) => {
        let cmp = 0;
        if (sortBy === 'date') {
          cmp = new Date(a.createdAt) - new Date(b.createdAt);
        } else {
          cmp = (STATUS_ORDER[a.status] ?? 9) - (STATUS_ORDER[b.status] ?? 9);
        }
        return sortDir === 'asc' ? cmp : -cmp;
      }) : [];

      const outstanding = history ? history.filter(r => r.isWinner && r.status === 'winner_selected') : [];

      function formatDate(d) {
        return d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
      }

      function statusLabel(r) {
        if (r.isWinner) {
          if (r.status === 'winner_selected')   return 'Won — Pending Receipt';
          if (r.status === 'receipt_confirmed') return 'Won — Receipt Confirmed';
        }
        if (r.status === 'active')   return 'Active';
        if (r.status === 'closed' || r.status === 'winner_selected' || r.status === 'receipt_confirmed') return 'Closed';
        return r.status;
      }

      function RaffleRow({ r, onConfirm }) {
        const [copied, setCopied] = useState(false);
        function copyId() {
          navigator.clipboard.writeText(r.id).then(() => {
            setCopied(true);
            setTimeout(() => setCopied(false), 1500);
          });
        }
        return (
          <div className="win-row">
            <div className="win-row-info">
              <div className="win-row-name">{r.dropName}</div>
              <div className="win-row-meta">
                {formatDate(r.closedAt || r.createdAt)} · {r.userBidTotal.toLocaleString()} Twiqs bid
                {r.isWinner ? ' · 🏆 Winner' : ''}
              </div>
              <div className="win-row-id" onClick={copyId} title="Click to copy raffle ID">
                {r.id.slice(0, 8)}… {copied ? '✓ copied' : '📋'}
              </div>
            </div>
            {r.isWinner && r.status === 'winner_selected' ? (
              <button className="win-row-confirm" onClick={() => onConfirm(r.id)}>
                Confirm Receipt
              </button>
            ) : (
              <span className={`win-row-status ${r.isWinner ? r.status : 'closed'}`}>{statusLabel(r)}</span>
            )}
          </div>
        );
      }

      return (
        <div className="profile-card">
          <p className="profile-title">Your Profile</p>
          <p className="profile-sub">Hi, {user.displayName}</p>
          {loading ? <p style={{ color: '#888', fontSize: '14px' }}>Loading…</p> : (
            <form onSubmit={save}>
              <div className="profile-field">
                <div className="profile-label">Venmo Handle</div>
                <input
                  className="profile-input"
                  type="text"
                  placeholder="@your-venmo"
                  maxLength={64}
                  value={handle}
                  onChange={e => setHandle(e.target.value.replace(/^@+/, ''))}
                />
                <div style={{ fontSize: '12px', color: '#aaa', marginTop: '4px' }}>
                  Used for Twiq cashouts. No payment is processed in Alpha.
                </div>
              </div>
              <button className="btn-profile-save" type="submit" disabled={saving}>
                {saving ? 'Saving…' : 'Save'}
              </button>
              {feedback && <p className={`profile-feedback ${feedback.type}`}>{feedback.msg}</p>}
            </form>
          )}

          {history !== null && (
            <div className="win-history">
              {outstanding.length > 0 && (
                <div className="outstanding-section">
                  <p className="outstanding-title">⚠ Outstanding — Action Required</p>
                  {outstanding.map(r => (
                    <RaffleRow key={r.id} r={r} onConfirm={confirmWin} />
                  ))}
                </div>
              )}

              <p className="win-history-title">Raffle History</p>
              <div className="history-controls">
                <span className="history-sort-label">Sort:</span>
                <button
                  className={`history-sort-btn${sortBy === 'date' ? ' active' : ''}`}
                  onClick={() => toggleSort('date')}
                >
                  Date {sortBy === 'date' ? (sortDir === 'desc' ? '↓' : '↑') : ''}
                </button>
                <button
                  className={`history-sort-btn${sortBy === 'status' ? ' active' : ''}`}
                  onClick={() => toggleSort('status')}
                >
                  Status {sortBy === 'status' ? (sortDir === 'desc' ? '↓' : '↑') : ''}
                </button>
              </div>
              {sorted.length === 0
                ? <p style={{ fontSize: '13px', color: '#aaa' }}>No raffle activity yet.</p>
                : sorted.map(r => <RaffleRow key={r.id} r={r} onConfirm={confirmWin} />)
              }
            </div>
          )}

          <div style={{ marginTop: '24px' }}>
            <button className="btn-sign-out" onClick={onBack}>← Back to Twiqit Commerce</button>
          </div>
        </div>
      );
    }

    // ---- App ----
    function App() {
      const [user, setUser] = useState(getSavedUser);
      const [drop, setDrop] = useState({ status: 'loading', data: null });
      const [bidBalance, setBidBalance] = useState(null);
      const [winRaffle, setWinRaffle] = useState(null);

      // Derive view from URL
      const [view, setViewState] = useState(() =>
        window.location.pathname === '/buy/profile' ? 'profile' : 'home'
      );

      function setView(v) {
        const url = v === 'profile' ? '/buy/profile' : '/buy';
        window.history.pushState({ view: v }, '', url);
        setViewState(v);
      }

      // Handle browser back/forward
      useEffect(() => {
        function onPop(e) {
          const v = e.state?.view ?? (window.location.pathname === '/buy/profile' ? 'profile' : 'home');
          setViewState(v);
        }
        window.addEventListener('popstate', onPop);
        return () => window.removeEventListener('popstate', onPop);
      }, []);

      useEffect(() => {
        telemetry('page_view', { path: window.location.pathname });
        fetch('/buy/api/raffle/active')
          .then(r => r.json())
          .then(data => {
            if (data) {
              setDrop({ status: 'done', data });
            } else {
              // No active raffle — show most recent closed one so winner can still confirm
              return fetch('/buy/api/raffle/recent')
                .then(r => r.json())
                .then(recent => setDrop({ status: 'done', data: recent }));
            }
          })
          .catch(() => setDrop({ status: 'done', data: null }));
      }, []);

      useEffect(() => {
        if (!user) return;
        fetch(`/buy/api/raffle/my-win?userId=${user.id}`)
          .then(r => r.json())
          .then(data => {
            // Only show banner for outstanding (unconfirmed) wins
            if (data && data.status === 'winner_selected') {
              setWinRaffle(data);
            }
          })
          .catch(() => {});
      }, [user]);

      function handleSignOut() { clearUser(); setUser(null); setView('home'); }
      function handleSignIn(u) { setUser(u); }

      if (drop.status === 'loading') {
        return <div className="loading">Loading…</div>;
      }

      if (!user) {
        return <UsernamePrompt onSuccess={handleSignIn} />;
      }

      if (view === 'profile') {
        return (
          <>
            <Header user={user} onSignOut={handleSignOut} onProfile={() => setView('profile')} onHome={() => setView('home')} />
            <BalanceBar user={user} externalBalance={bidBalance} onProfile={() => setView('profile')} />
            <ProfilePage user={user} onBack={() => setView('home')} />
          </>
        );
      }

      return (
        <>
          <Header user={user} onSignOut={handleSignOut} onProfile={() => setView('profile')} onHome={() => setView('home')} />
          <BalanceBar user={user} externalBalance={bidBalance} onProfile={() => setView('profile')} />
          {winRaffle && (
            <WinnerBanner user={user} winRaffle={winRaffle} onConfirmed={() => setWinRaffle(null)} />
          )}
          {drop.data
            ? <DropCard
                drop={drop.data.drop}
                raffle={drop.data.raffle}
                user={user}
                onBidSuccess={bal => setBidBalance(bal)}
              />
            : <EmptyState />}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('card'));
    root.render(<App />);
  </script>
</body>
</html>

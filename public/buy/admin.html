<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Twiqit · Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: helvetica, arial, system-ui, sans-serif;
      background: #1a1a2e; color: #e2e8f0;
      padding: 24px 16px;
    }
    .page { max-width: 680px; margin: 0 auto; }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-circle {
      width: 32px; height: 32px; border-radius: 50%;
      background: #fff; border: 1px solid #cbd5e1;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: bold; color: #933333;
    }
    .logo-text { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: #94a3b8; }
    .admin-badge {
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      background: #933333; color: #fff; padding: 3px 8px; border-radius: 999px;
    }
    h2 { font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: #64748b; margin: 0 0 14px; }
    .card {
      background: #16213e; border: 1px solid #2d3748;
      border-radius: 12px; padding: 22px 24px; margin-bottom: 20px;
    }
    .card-title {
      font-size: 15px; font-weight: 600; color: #e2e8f0; margin: 0 0 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .status-badge {
      font-size: 10px; padding: 2px 8px; border-radius: 999px;
      text-transform: uppercase; letter-spacing: 0.12em;
    }
    .status-active { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .status-none { background: rgba(100,116,139,0.15); color: #94a3b8; border: 1px solid rgba(100,116,139,0.3); }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; margin-bottom: 16px; }
    .info-item label { display: block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #64748b; margin-bottom: 3px; }
    .info-item span { font-size: 14px; color: #e2e8f0; font-family: monospace; }
    .divider { border: none; border-top: 1px solid #2d3748; margin: 16px 0; }
    label { display: block; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #94a3b8; margin-bottom: 5px; }
    input, select {
      width: 100%; padding: 9px 12px; border-radius: 7px;
      background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
      font-size: 14px; margin-bottom: 14px; outline: none;
    }
    input:focus, select:focus { border-color: #933333; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .btn {
      padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 600; letter-spacing: 0.04em;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #933333; color: #fff; }
    .btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .btn-danger { background: #7f1d1d; color: #fca5a5; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 12px 18px; border-radius: 8px; font-size: 13px;
      max-width: 340px; z-index: 999; display: none;
    }
    .toast.success { background: #14532d; color: #86efac; border: 1px solid #166534; }
    .toast.error { background: #7f1d1d; color: #fca5a5; border: 1px solid #991b1b; }
    .empty { color: #64748b; font-size: 14px; font-style: italic; }
    .raffle-id { font-size: 11px; color: #64748b; font-family: monospace; word-break: break-all; }
    .status-closed { background: rgba(100,116,139,0.15); color: #94a3b8; border: 1px solid rgba(100,116,139,0.3); }
    .status-winner { background: rgba(234,179,8,0.15); color: #fbbf24; border: 1px solid rgba(234,179,8,0.3); }
    .status-confirmed { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .status-no-winner { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .history-item { border-bottom: 1px solid #2d3748; }
    .history-item:last-child { border-bottom: none; }
    .history-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 13px 0; cursor: pointer; user-select: none;
    }
    .history-row:hover .history-drop { color: #fff; }
    .history-drop { font-size: 14px; font-weight: 600; color: #e2e8f0; margin-bottom: 3px; transition: color 0.15s; }
    .history-meta { font-size: 12px; color: #64748b; }
    .history-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .history-chevron { font-size: 11px; color: #475569; transition: transform 0.2s; }
    .history-chevron.open { transform: rotate(90deg); }
    .history-detail {
      display: none; padding: 0 0 14px;
    }
    .history-detail.open { display: block; }
    .detail-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px 20px;
      background: #0f172a; border-radius: 8px; padding: 14px 16px;
    }
    .detail-item label { display: block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #475569; margin-bottom: 2px; }
    .detail-item span { font-size: 13px; color: #e2e8f0; font-family: monospace; }
    /* Product list */
    .product-item {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px; padding: 12px 0; border-bottom: 1px solid #2d3748;
    }
    .product-item:last-child { border-bottom: none; padding-bottom: 0; }
    .product-name { font-size: 14px; font-weight: 600; color: #e2e8f0; margin-bottom: 3px; }
    .product-meta { font-size: 12px; color: #64748b; }
    .product-edit-form { margin-top: 10px; display: none; }
    .product-edit-form.open { display: block; }
    .product-edit-form input { margin-bottom: 8px; }
    .product-actions { display: flex; gap: 8px; flex-shrink: 0; }
    /* Ops dashboard */
    .ops-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px; }
    .ops-stat { background: #0f172a; border-radius: 8px; padding: 12px 14px; }
    .ops-stat label { display: block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #475569; margin-bottom: 4px; }
    .ops-stat .val { font-size: 20px; font-weight: 700; color: #e2e8f0; font-family: monospace; }
    .ops-stat .val.ok { color: #4ade80; }
    .ops-stat .val.warn { color: #fbbf24; }
    .ops-stat .val.crit { color: #f87171; }
    .ops-anomaly { font-size: 12px; padding: 7px 10px; border-radius: 6px; margin-bottom: 6px; }
    .ops-anomaly.warning { background: rgba(234,179,8,0.1); border: 1px solid rgba(234,179,8,0.25); color: #fbbf24; }
    .ops-anomaly.error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.25);  color: #f87171; }
    .ops-anomaly.critical{ background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4);   color: #fca5a5; }
    .ops-funnel { display: flex; gap: 6px; flex-wrap: wrap; }
    .ops-funnel-step { background: #0f172a; border-radius: 6px; padding: 8px 12px; text-align: center; flex: 1; min-width: 80px; }
    .ops-funnel-step .fval { font-size: 18px; font-weight: 700; color: #e2e8f0; font-family: monospace; }
    .ops-funnel-step .flabel { font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-bar">
      <a class="logo" href="/buy">
        <div class="logo-circle">T</div>
        <span class="logo-text">Twiqit</span>
      </a>
      <span class="admin-badge">Admin</span>
    </div>

    <h2>Active Raffle</h2>
    <div class="card" id="active-card">
      <div class="empty">Loading…</div>
    </div>

    <h2>Create New Raffle</h2>
    <div class="card">
      <div class="card-title">New Raffle</div>
      <label>Product</label>
      <select id="create-drop"></select>
      <div class="form-row">
        <div>
          <label>Min Twiq Threshold</label>
          <input type="number" id="create-min" value="500" min="1" />
        </div>
        <div>
          <label>Max Twiq Threshold</label>
          <input type="number" id="create-max" value="5000" min="1" />
        </div>
      </div>
      <label>Expires At</label>
      <input type="datetime-local" id="create-expires" />
      <div class="btn-row">
        <button class="btn btn-primary" onclick="createRaffle()">Create Raffle</button>
      </div>
    </div>

    <h2>Manage Products</h2>
    <div class="card" id="products-card">
      <div class="empty">Loading…</div>
    </div>
    <div class="card" id="new-product-card">
      <div class="card-title">Add New Product</div>
      <div class="btn-row" style="margin-bottom:14px">
        <button class="btn btn-secondary" onclick="fetchSuggestions()" id="suggest-btn">✦ Suggest Product</button>
      </div>
      <div id="suggestions-panel" style="display:none;margin-bottom:14px">
        <label>Pick a suggestion</label>
        <select id="suggestions-select" onchange="applySuggestion()" style="margin-bottom:8px">
          <option value="">— select a product —</option>
        </select>
      </div>
      <label>Name</label>
      <input type="text" id="np-name" placeholder="e.g. Sony WH-1000XM5" />
      <label>Description</label>
      <input type="text" id="np-desc" placeholder="Short description" />
      <label>Image URL</label>
      <input type="text" id="np-image" placeholder="https://…" />
      <label>Retail Value (dollars)</label>
      <input type="number" id="np-value" placeholder="e.g. 399.99" min="0.01" step="0.01" />
      <div class="btn-row">
        <button class="btn btn-primary" onclick="createProduct()">Add Product</button>
      </div>
    </div>

    <h2>Raffle History</h2>
    <div id="history-list">
      <div class="card"><div class="empty">Loading…</div></div>
    </div>

    <h2>Ops Report <span id="ops-refresh-ts" style="font-size:10px;color:#475569;font-weight:400;letter-spacing:0;text-transform:none;margin-left:8px"></span></h2>
    <div class="card" id="ops-card">
      <div class="empty">Loading…</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let activeRaffle = null;

    function toast(msg, type = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast ' + type;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3500);
    }

    function fmt(cents) { return '$' + (cents / 100).toFixed(2); }
    function fmtDate(d) { return new Date(d).toLocaleString(); }

    async function api(method, path, body) {
      const token = localStorage.getItem('twiqit_token') || '';
      const r = await fetch('/buy/api' + path, {
        method,
        headers: {
          'Content-Type': 'application/json',
          ...(token && { 'Authorization': 'Bearer ' + token }),
        },
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await r.json();
      if (r.status === 401) { window.location.href = '/buy'; return; }
      if (!r.ok) throw Object.assign(new Error(data?.error?.message || 'Request failed'), { code: data?.error?.code, status: r.status });
      return data;
    }

    async function loadDrops() {
      try {
        const drops = await api('GET', '/admin/drops');
        const sel = document.getElementById('create-drop');
        sel.innerHTML = drops.map(d =>
          `<option value="${d.id}">${d.name} (${fmt(d.retailValue)})</option>`
        ).join('');
      } catch (e) { console.error(e); }
    }

    async function loadProducts() {
      const card = document.getElementById('products-card');
      try {
        const [products, raffles] = await Promise.all([
          api('GET', '/admin/drops'),
          api('GET', '/admin/raffles'),
        ]);

        // Build a map: productId → array of raffles
        const rafflesByProduct = {};
        for (const r of raffles) {
          if (!rafflesByProduct[r.productId]) rafflesByProduct[r.productId] = [];
          rafflesByProduct[r.productId].push(r);
        }

        if (!products.length) {
          card.innerHTML = `<div class="empty">No products yet. Add one below.</div>`;
          return;
        }
        card.innerHTML = products.map((p) => {
          const linked = rafflesByProduct[p.id] || [];
          const wonRaffle = linked.find(r => r.winnerName || r.status === 'winner_selected' || r.status === 'receipt_confirmed');
          const productWinnerTag = linked.length === 0
            ? ''
            : wonRaffle
              ? `<div class="product-meta" style="margin-top:4px;color:#4ade80">
                   🏆 Won by <strong>${wonRaffle.winnerName || 'selected winner'}</strong>
                   ${wonRaffle.winnerId ? `<span style="font-family:monospace;font-size:11px;color:#64748b;margin-left:6px">(User ID: ${wonRaffle.winnerId})</span>` : ''}
                 </div>`
              : `<div class="product-meta" style="margin-top:4px;color:#f59e0b">⏳ Not yet won</div>`;

          const raffleInfo = linked.length
            ? linked.map(r => {
                const winnerLine = (r.winnerName || r.winnerId)
                  ? `<span style="color:#4ade80;margin-left:8px">
                       🏆 ${r.winnerName || '—'}
                       ${r.winnerId ? `<span style="font-family:monospace;font-size:11px;color:#64748b;margin-left:4px">(${r.winnerId})</span>` : ''}
                     </span>`
                  : '';
                return `<div class="product-meta" style="margin-top:3px">
                  Raffle: <span style="font-family:monospace;font-size:11px;color:#94a3b8">${r.id}</span>
                  &nbsp;${statusBadge(r.status)}${winnerLine}
                </div>`;
              }).join('')
            : `<div class="product-meta" style="margin-top:3px">
                <span style="color:#475569;font-style:italic">Not associated with any raffle</span>
               </div>`;

          return `
          <div class="product-item" id="pi-${p.id}">
            <div style="flex:1">
              <div class="product-name">${p.name}</div>
              <div class="product-meta">${fmt(p.retailValue)} retail${p.description ? ' · ' + p.description : ''}</div>
              ${p.imageUrl ? `<div class="product-meta" style="margin-top:2px;word-break:break-all">${p.imageUrl}</div>` : ''}
              ${productWinnerTag}
              <div class="product-meta" style="margin-top:3px;font-family:monospace;font-size:11px;color:#475569">Product ID: ${p.id}</div>
              ${raffleInfo}
              <div class="product-edit-form" id="pef-${p.id}">
                <input type="text"   id="pe-name-${p.id}"  value="${p.name}" placeholder="Name" />
                <input type="text"   id="pe-desc-${p.id}"  value="${p.description || ''}" placeholder="Description" />
                <input type="text"   id="pe-img-${p.id}"   value="${p.imageUrl || ''}" placeholder="Image URL" />
                <input type="number" id="pe-val-${p.id}"   value="${(p.retailValue / 100).toFixed(2)}" placeholder="Retail value (dollars)" min="0.01" step="0.01" />
                <div class="btn-row">
                  <button class="btn btn-secondary" style="font-size:12px;padding:7px 14px" onclick="saveProduct('${p.id}')">Save</button>
                  <button class="btn btn-secondary" style="font-size:12px;padding:7px 14px" onclick="cancelEdit('${p.id}')">Cancel</button>
                </div>
              </div>
            </div>
            <div class="product-actions">
              <button class="btn btn-secondary" style="font-size:11px;padding:6px 12px" onclick="editProduct('${p.id}')">Edit</button>
              <button class="btn btn-danger"    style="font-size:11px;padding:6px 12px" onclick="deleteProduct('${p.id}')">Delete</button>
            </div>
          </div>`;
        }).join('');
      } catch (e) {
        card.innerHTML = `<div class="empty" style="color:#fca5a5">Error: ${e.message}</div>`;
      }
    }

    function editProduct(id) {
      document.getElementById('pef-' + id).classList.add('open');
    }
    function cancelEdit(id) {
      document.getElementById('pef-' + id).classList.remove('open');
    }

    async function saveProduct(id) {
      try {
        const name        = document.getElementById('pe-name-' + id).value.trim();
        const description = document.getElementById('pe-desc-' + id).value.trim();
        const imageUrl    = document.getElementById('pe-img-' + id).value.trim();
        const retailValue = Math.round(parseFloat(document.getElementById('pe-val-' + id).value) * 100);
        await api('PUT', '/admin/product/' + id, { name, description, imageUrl, retailValue });
        toast('Product updated');
        loadProducts();
        loadDrops();
      } catch (e) { toast(e.message, 'error'); }
    }

    async function createProduct() {
      try {
        const name        = document.getElementById('np-name').value.trim();
        const description = document.getElementById('np-desc').value.trim();
        const imageUrl    = document.getElementById('np-image').value.trim();
        const retailValue = Math.round(parseFloat(document.getElementById('np-value').value) * 100);
        if (!name || !retailValue) { toast('Name and retail value are required.', 'error'); return; }
        await api('POST', '/admin/product', { name, description, imageUrl, retailValue });
        toast('Product created');
        document.getElementById('np-name').value = '';
        document.getElementById('np-desc').value = '';
        document.getElementById('np-image').value = '';
        document.getElementById('np-value').value = '';
        loadProducts();
        loadDrops();
      } catch (e) { toast(e.message, 'error'); }
    }

    async function deleteProduct(id) {
      if (!confirm('Delete this product? This cannot be undone.')) return;
      try {
        await api('DELETE', '/admin/product/' + id);
        toast('Product deleted');
        loadProducts();
        loadDrops();
      } catch (e) {
        if (e.code === 'PRODUCT_IN_USE') {
          toast('This product has raffle history and cannot be deleted.', 'error');
        } else {
          toast(e.message, 'error');
        }
      }
    }
    async function loadActive() {
      const card = document.getElementById('active-card');
      try {
        const data = await api('GET', '/raffle/active');
        if (!data) {
          card.innerHTML = `<div class="empty">No active raffle. Create one below.</div>`;
          activeRaffle = null;
          return;
        }
        activeRaffle = data.raffle;
        card.innerHTML = `
          <div class="card-title">
            ${data.drop.name}
            <span class="status-badge status-active">Active</span>
          </div>
          <div class="raffle-id">Raffle ID: ${data.raffle.id}</div>
          <hr class="divider" />
          <div class="info-grid">
            <div class="info-item"><label>Retail Value</label><span>${fmt(data.drop.retailValue)}</span></div>
            <div class="info-item"><label>Expires</label><span>${fmtDate(data.raffle.expiresAt)}</span></div>
            <div class="info-item"><label>Min Threshold</label><span>${data.raffle.minTwiqThreshold} Twiqs</span></div>
            <div class="info-item"><label>Max Threshold</label><span>${data.raffle.maxTwiqThreshold} Twiqs</span></div>
            <div class="info-item"><label>Total Bid</label><span>${data.raffle.totalTwiqsBid} Twiqs</span></div>
            <div class="info-item"><label>Hosted By</label><span>${data.raffle.creatorName || '—'}</span></div>
            <div class="info-item"><label>Creator ID</label><span style="font-size:11px;word-break:break-all">${data.raffle.createdBy || '—'}</span></div>
          </div>
          <hr class="divider" />
          <div style="margin-bottom:14px">
            <label>Update Min Threshold</label>
            <input type="number" id="upd-min" value="${data.raffle.minTwiqThreshold}" min="1" />
            <label>Update Max Threshold</label>
            <input type="number" id="upd-max" value="${data.raffle.maxTwiqThreshold}" min="1" />
            <label>Update Expires At</label>
            <input type="datetime-local" id="upd-expires" value="${toLocalInput(data.raffle.expiresAt)}" />
          </div>
          <div class="btn-row">
            <button class="btn btn-secondary" onclick="updateRaffle()">Update Raffle</button>
            <button class="btn btn-danger" onclick="showReplace()">Replace Raffle</button>
            <button class="btn btn-secondary" onclick="toggleHidden('${data.raffle.id}', ${data.raffle.hidden})" id="hide-btn">${data.raffle.hidden ? 'Unhide Raffle' : 'Hide Raffle'}</button>
          </div>
          <div id="replace-form" style="display:none;margin-top:18px;border-top:1px solid #2d3748;padding-top:16px">
            <div class="card-title" style="font-size:13px;margin-bottom:12px">Replace With New Raffle</div>
            <label>Product</label>
            <select id="rep-drop"></select>
            <div class="form-row">
              <div><label>Min Threshold</label><input type="number" id="rep-min" value="500" min="1" /></div>
              <div><label>Max Threshold</label><input type="number" id="rep-max" value="5000" min="1" /></div>
            </div>
            <label>Expires At</label>
            <input type="datetime-local" id="rep-expires" />
            <div class="btn-row">
              <button class="btn btn-danger" onclick="replaceRaffle()">Confirm Replace</button>
              <button class="btn btn-secondary" onclick="hideReplace()">Cancel</button>
            </div>
          </div>
        `;
        // Populate replace drop selector
        const drops = await api('GET', '/admin/drops');
        const repSel = document.getElementById('rep-drop');
        if (repSel) repSel.innerHTML = drops.map(d =>
          `<option value="${d.id}">${d.name} (${fmt(d.retailValue)})</option>`
        ).join('');
      } catch (e) {
        card.innerHTML = `<div class="empty" style="color:#fca5a5">Error loading raffle: ${e.message}</div>`;
      }
    }

    function toLocalInput(dateStr) {
      const d = new Date(dateStr);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function defaultExpiry() {
      const d = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000);
      return toLocalInput(d.toISOString());
    }

    function showReplace() { document.getElementById('replace-form').style.display = 'block'; }
    function hideReplace() { document.getElementById('replace-form').style.display = 'none'; }

    async function createRaffle() {
      try {
        const productId = document.getElementById('create-drop').value;
        const minTwiqThreshold = parseInt(document.getElementById('create-min').value);
        const maxTwiqThreshold = parseInt(document.getElementById('create-max').value);
        const expiresAt = new Date(document.getElementById('create-expires').value).toISOString();
        await api('POST', '/admin/raffle', { productId, minTwiqThreshold, maxTwiqThreshold, expiresAt });
        toast('Raffle created successfully');
        loadActive();
        loadHistory();
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    async function updateRaffle() {
      if (!activeRaffle) return;
      try {
        const minTwiqThreshold = parseInt(document.getElementById('upd-min').value);
        const maxTwiqThreshold = parseInt(document.getElementById('upd-max').value);
        const expiresAt = new Date(document.getElementById('upd-expires').value).toISOString();
        await api('PUT', '/admin/raffle/' + activeRaffle.id, { minTwiqThreshold, maxTwiqThreshold, expiresAt });
        toast('Raffle updated');
        loadActive();
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    async function replaceRaffle() {
      if (!activeRaffle) return;
      try {
        const productId = document.getElementById('rep-drop').value;
        const minTwiqThreshold = parseInt(document.getElementById('rep-min').value);
        const maxTwiqThreshold = parseInt(document.getElementById('rep-max').value);
        const expiresAt = new Date(document.getElementById('rep-expires').value).toISOString();
        await api('POST', '/admin/raffle/' + activeRaffle.id + '/replace', { productId, minTwiqThreshold, maxTwiqThreshold, expiresAt });
        toast('Raffle replaced — new raffle is now active');
        loadActive();
        loadHistory();
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    function statusBadge(status) {
      const map = {
        active: 'status-active',
        closed: 'status-closed',
        winner_selected: 'status-winner',
        receipt_confirmed: 'status-confirmed',
        no_winner: 'status-no-winner',
      };
      const cls = map[status] || 'status-none';
      const label = status.replace(/_/g, ' ');
      return `<span class="status-badge ${cls}">${label}</span>`;
    }

    async function loadHistory() {
      const container = document.getElementById('history-list');
      try {
        const raffles = await api('GET', '/admin/raffles');
        if (!raffles.length) {
          container.innerHTML = `<div class="card"><div class="empty">No raffles yet.</div></div>`;
          return;
        }
        const items = raffles.map((r, i) => {
          const summary = r.closedAt
            ? 'Closed ' + fmtDate(r.closedAt)
            : 'Created ' + fmtDate(r.createdAt);
          return `
            <div class="history-item">
              <div class="history-row" onclick="toggleHistory(${i})">
                <div>
                  <div class="history-drop">${r.dropName}</div>
                  <div class="history-meta">${summary} &nbsp;·&nbsp; ${r.totalTwiqsBid} Twiqs bid</div>
                </div>
                <div class="history-right">
                  ${r.hidden ? '<span style="font-size:11px;color:#64748b;letter-spacing:0.08em">HIDDEN</span>' : ''}
                  ${statusBadge(r.status)}
                  <button class="btn btn-secondary" style="font-size:11px;padding:4px 10px;margin:0" onclick="event.stopPropagation();toggleHidden('${r.id}', ${r.hidden})">${r.hidden ? 'Unhide' : 'Hide'}</button>
                  <span class="history-chevron" id="chev-${i}">▶</span>
                </div>
              </div>
              <div class="history-detail" id="detail-${i}">
                <div class="detail-grid">
                  <div class="detail-item"><label>Product</label><span>${r.dropName}</span></div>
                  <div class="detail-item"><label>Status</label><span>${r.status.replace(/_/g, ' ')}</span></div>
                  <div class="detail-item"><label>Total Twiqs Bid</label><span>${r.totalTwiqsBid}</span></div>
                  <div class="detail-item"><label>Min Threshold</label><span>${r.minTwiqThreshold}</span></div>
                  <div class="detail-item"><label>Max Threshold</label><span>${r.maxTwiqThreshold}</span></div>
                  <div class="detail-item"><label>Retail Value</label><span>${fmt(r.dropRetailValue)}</span></div>
                  <div class="detail-item"><label>Winner</label><span>${r.winnerName || '—'}</span></div>
                  <div class="detail-item"><label>Hosted By</label><span>${r.creatorName || '—'}</span></div>
                  <div class="detail-item" style="grid-column:1/-1"><label>Creator ID</label><span style="word-break:break-all">${r.createdBy || '—'}</span></div>
                  <div class="detail-item"><label>Expires At</label><span>${r.expiresAt ? fmtDate(r.expiresAt) : '—'}</span></div>
                  <div class="detail-item"><label>Closed At</label><span>${r.closedAt ? fmtDate(r.closedAt) : '—'}</span></div>
                  <div class="detail-item"><label>Created At</label><span>${fmtDate(r.createdAt)}</span></div>
                  <div class="detail-item"><label>Hidden</label><span>${r.hidden ? '🙈 Yes' : '👁 No'}</span></div>
                  <div class="detail-item" style="grid-column:1/-1"><label>Raffle ID</label><span style="word-break:break-all">${r.id}</span></div>
                  <div class="detail-item" style="grid-column:1/-1"><label>Product ID</label><span style="word-break:break-all">${r.productId}</span></div>
                  <div class="detail-item" style="grid-column:1/-1;padding-top:6px">
                    <button class="btn btn-secondary" style="font-size:12px;padding:7px 14px" onclick="toggleHidden('${r.id}', ${r.hidden})">${r.hidden ? 'Unhide Raffle' : 'Hide Raffle'}</button>
                  </div>
                </div>
              </div>
            </div>`;
        }).join('');
        container.innerHTML = `<div class="card">${items}</div>`;
      } catch (e) {
        container.innerHTML = `<div class="card"><div class="empty" style="color:#fca5a5">Error: ${e.message}</div></div>`;
      }
    }

    function toggleHistory(i) {
      const detail = document.getElementById('detail-' + i);
      const chev = document.getElementById('chev-' + i);
      const open = detail.classList.toggle('open');
      chev.classList.toggle('open', open);
    }

    let _suggestions = [];

    async function fetchSuggestions() {
      const btn = document.getElementById('suggest-btn');
      btn.disabled = true;
      btn.textContent = 'Fetching…';
      try {
        _suggestions = await api('GET', '/admin/product-suggestions');
        const sel = document.getElementById('suggestions-select');
        sel.innerHTML = '<option value="">— select a product —</option>' +
          _suggestions.map((s, i) => `<option value="${i}">${s.name}</option>`).join('');
        document.getElementById('suggestions-panel').style.display = 'block';
        toast(`${_suggestions.length} suggestions loaded`);
      } catch (e) {
        toast(e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '✦ Suggest Product';
      }
    }

    function applySuggestion() {
      const idx = document.getElementById('suggestions-select').value;
      if (idx === '') return;
      const s = _suggestions[parseInt(idx)];
      document.getElementById('np-name').value  = s.name;
      document.getElementById('np-desc').value  = s.description;
      document.getElementById('np-image').value = s.imageUrl;
      document.getElementById('np-value').value = (s.retailValue / 100).toFixed(2);
    }

    async function toggleHidden(raffleId, currentlyHidden) {
      try {
        await api('PATCH', '/admin/raffle/' + raffleId + '/hidden', { hidden: !currentlyHidden });
        toast(currentlyHidden ? 'Raffle is now visible to users' : 'Raffle hidden from users');
        loadActive();
        loadHistory();
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    // ---------------------------------------------------------------------------
    // Ops Report
    // ---------------------------------------------------------------------------
    async function loadOpsStatus() {
      const card = document.getElementById('ops-card');
      try {
        const { status, report } = await api('GET', '/admin/ops-status');

        const agentColor = status.running ? 'ok' : 'crit';
        const anomColor  = status.anomalyCount === 0 ? 'ok' : status.anomalyCount < 5 ? 'warn' : 'crit';
        const p95Color   = report.latencyPercentiles.p95 < 500 ? 'ok' : report.latencyPercentiles.p95 < 1500 ? 'warn' : 'crit';

        const recentAnomalies = (report.anomalies || []).slice(-5).reverse();
        const anomalyHtml = recentAnomalies.length
          ? recentAnomalies.map(a =>
              `<div class="ops-anomaly ${a.severity}">
                <strong>${a.signal.replace(/_/g,' ')}</strong> — ${a.detail}
                <span style="float:right;color:#475569;font-size:11px">${new Date(a.ts).toLocaleTimeString()}</span>
              </div>`
            ).join('')
          : `<div style="color:#4ade80;font-size:13px">No anomalies in last hour ✓</div>`;

        const f = report.journeyFunnel;
        const adRate = (report.adWatchCompletionRate * 100).toFixed(0);
        const adRateColor = report.adWatchCompletionRate >= 0.5 ? 'ok' : 'warn';

        card.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
            <div class="card-title" style="margin:0">Agent Health</div>
            <button class="btn btn-secondary" style="font-size:11px;padding:5px 12px" onclick="loadOpsStatus()">↻ Refresh</button>
          </div>
          <div class="ops-grid">
            <div class="ops-stat"><label>Agent</label><div class="val ${agentColor}">${status.running ? 'Running' : 'Stopped'}</div></div>
            <div class="ops-stat"><label>Log Index</label><div class="val">${status.logIndexSize.toLocaleString()}</div></div>
            <div class="ops-stat"><label>Anomalies (all)</label><div class="val ${anomColor}">${status.anomalyCount}</div></div>
            <div class="ops-stat"><label>Last Heartbeat</label><div class="val" style="font-size:12px">${new Date(status.lastHeartbeat).toLocaleTimeString()}</div></div>
            <div class="ops-stat"><label>p95 Latency</label><div class="val ${p95Color}">${report.latencyPercentiles.p95}ms</div></div>
            <div class="ops-stat"><label>p99 Latency</label><div class="val">${report.latencyPercentiles.p99}ms</div></div>
            <div class="ops-stat"><label>Twiq Txns (1h)</label><div class="val">${report.twiqTransactionVolume}</div></div>
            <div class="ops-stat"><label>Ad Completion</label><div class="val ${adRateColor}">${adRate}%</div></div>
            <div class="ops-stat"><label>Failed Logins</label><div class="val ${report.failedLoginAttempts > 10 ? 'warn' : 'ok'}">${report.failedLoginAttempts}</div></div>
          </div>
          <hr class="divider" />
          <div style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#64748b;margin-bottom:10px">Journey Funnel (last hour)</div>
          <div class="ops-funnel">
            <div class="ops-funnel-step"><div class="fval">${f.registered}</div><div class="flabel">Registered</div></div>
            <div class="ops-funnel-step"><div class="fval">${f.watchedAd}</div><div class="flabel">Watched Ad</div></div>
            <div class="ops-funnel-step"><div class="fval">${f.placedBid}</div><div class="flabel">Bid</div></div>
            <div class="ops-funnel-step"><div class="fval">${f.wonRaffle}</div><div class="flabel">Won</div></div>
          </div>
          <hr class="divider" />
          <div style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#64748b;margin-bottom:10px">Recent Anomalies (last hour)</div>
          ${anomalyHtml}
        `;
        document.getElementById('ops-refresh-ts').textContent = 'as of ' + new Date().toLocaleTimeString();
      } catch (e) {
        card.innerHTML = `<div class="empty" style="color:#fca5a5">Error: ${e.message}</div>`;
      }
    }

    // Auto-refresh ops every 30s
    setInterval(loadOpsStatus, 30000);

    // Init
    document.getElementById('create-expires').value = defaultExpiry();
    loadDrops();
    loadProducts();
    loadActive();
    loadHistory();
    loadOpsStatus();
  </script>
</body>
</html>

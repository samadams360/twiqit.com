<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Twiqit · Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Twiqit is the product studio of Desert Bay, LLC, building a portfolio of businesses." />
  <style>
    :root {
      --bg: #304d44;
      --bg-horizon: url("data:image/svg+xml,%3Csvg width='1600' height='400' viewBox='0 0 1600 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0' stop-color='%23000000' stop-opacity='0.28'/%3E%3Cstop offset='1' stop-color='%23000000' stop-opacity='0'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='1600' height='400' fill='url(%23g)'/%3E%3C/svg%3E");
      --accent: #933333;
      --accent-soft: #f3e8eb;
      --accent-muted: #b45353;
      --text-main: #333333;
      --text-muted: #666666;
      --text-soft: #999999;
      --border-subtle: #d4d4d4;
      --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.45);
      --radius-lg: 12px;
      --radius-pill: 999px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: helvetica, arial, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-main);
      background:
        var(--bg-horizon) top center repeat-x,
        var(--bg);
      display: flex;
      justify-content: center;
      padding: 16px 16px 40px;
      text-align: center;
    }

    .page {
      width: 100%;
      max-width: 960px;
      background: #ffffff;
      border-radius: 14px;
      border: 1px solid rgba(0, 0, 0, 0.04);
      box-shadow: var(--shadow-soft);
      padding: 26px 28px 22px;
      text-align: left;
    }

    @media (min-width: 768px) {
      .page {
        padding: 30px 36px 26px;
      }
    }

    .page-header {
      margin: -26px -28px 22px; /* pull header to full width of card */
      position: relative;
      line-height: 0;
    }

    @media (min-width: 768px) {
      .page-header {
        margin: -30px -36px 24px;
      }
    }

    .page-header img {
      width: 100%;
      height: auto;
      display: block;
      vertical-align: bottom;
    }

    .page-header-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.5));
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 12px 20px;
      pointer-events: none;
    }

    .page-header-inner {
      text-align: center;
      color: #f5f5f5;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.7);
    }

    .page-header-title {
      font-size: 20px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .page-header-subtitle {
      font-size: 12px;
      margin-top: 2px;
      opacity: 0.9;
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 10px rgba(15, 23, 42, 0.28);
    }

    .brand-mark-inner {
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .brand-text h1 {
      font-size: 16px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin: 0 0 2px;
      color: var(--text-main);
    }

    .brand-text p {
      margin: 0;
      font-size: 12px;
      color: var(--text-soft);
    }

    .tag {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      color: var(--text-soft);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .tag-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.35);
    }

    .layout {
      max-width: 100%;
    }

    .hero-title {
      font-size: 22px;
      line-height: 1.25;
      margin: 0 0 10px;
    }

    .hero-title strong {
      color: var(--accent);
    }

    .hero-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin: 0 0 16px;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
      color: var(--text-soft);
      margin-bottom: 16px;
    }

    .chip {
      padding: 4px 9px;
      border-radius: var(--radius-pill);
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .chip-label {
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 10px;
      color: var(--text-soft);
    }

    .chip-value {
      font-size: 12px;
      color: var(--text-main);
    }

    .chip-dot {
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: var(--accent);
    }

    .portfolio {
      border-radius: 10px;
      border: 1px solid #e5e5e5;
      padding: 14px 14px 12px;
      background: #ffffff;
      margin-top: 4px;
    }

    .portfolio-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .portfolio-header h2 {
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin: 0;
    }

    .portfolio-count {
      font-size: 11px;
      color: var(--text-soft);
    }

    .project-card {
      border-radius: 8px;
      padding: 10px 9px 10px;
      background: #f9fafb;
      border: 1px solid #e5e5e5;
      margin-top: 4px;
    }

    .project-label {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 4px;
    }

    .project-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .project-title-main {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-main);
    }

    .project-status {
      border-radius: var(--radius-pill);
      padding: 3px 8px;
      font-size: 11px;
      border: 1px solid rgba(148, 27, 27, 0.6);
      background: #fff1f2;
      color: var(--accent-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .project-body {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 4px;
    }

    .project-tag {
      font-size: 11px;
      padding: 3px 7px;
      border-radius: 999px;
      background: #ffffff;
      border: 1px solid #e5e5e5;
      color: var(--text-main);
    }

    .project-note {
      font-size: 11px;
      color: var(--text-soft);
    }

    .page-footer {
      padding-top: 28px;
      margin-top: 24px;
      border-top: 1px solid #e5e5e5;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 24px 32px;
      font-size: 13px;
      color: var(--text-muted);
    }

    @media (max-width: 599px) {
      .page-footer {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .footer-col:nth-child(2),
      .footer-col:last-child {
        display: block;
        justify-content: unset;
      }

      .footer-col:nth-child(2) .footer-col-inner,
      .footer-col:last-child .footer-col-inner {
        display: block;
      }
    }

    .footer-col:first-child {
      text-align: left;
    }

    @media (min-width: 600px) {
      .footer-col:nth-child(2) {
        display: flex;
        justify-content: center;
        text-align: left;
      }

      .footer-col:nth-child(2) .footer-col-inner {
        text-align: left;
      }

      .footer-col:last-child {
        display: flex;
        justify-content: flex-end;
        text-align: left;
      }

      .footer-col:last-child .footer-col-inner {
        text-align: left;
      }
    }

    .footer-col h4 {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin: 0 0 12px;
      font-weight: 600;
    }

    .footer-col ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .footer-col li {
      margin-bottom: 8px;
    }

    .footer-col a {
      color: var(--text-muted);
      text-decoration: none;
    }

    .footer-col a:hover {
      color: var(--accent);
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="page-header">
      <img src="images/web_header.png" alt="Twiqit" />
      <div class="page-header-overlay">
        <div class="page-header-inner">
          
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="hero">

        <p class="hero-subtitle">Twiqit is a product studio that builds end-to-end businesses with Agentic AI.</p>
      </section>
    </main>

    <footer class="page-footer">
      <div class="footer-col">
        <h4>Products</h4>
        <ul>
          <li><a href="#">E‑Commerce</a></li>
        </ul>
      </div>
      <div class="footer-col">
        <div class="footer-col-inner">
          <h4>Company</h4>
          <ul>
            <li><a href="#">Company</a></li>
          </ul>
        </div>
      </div>
      <div class="footer-col">
        <div class="footer-col-inner">
          <h4>Resources</h4>
          <ul>
            <li><a href="#">Legal</a></li>
          </ul>
        </div>
      </div>
    </footer>
  </div>
</body>
</html>

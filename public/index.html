<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Twiqit Hello World</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #4f46e5, #111827);
      color: #f9fafb;
    }
    .card {
      background: rgba(15, 23, 42, 0.9);
      padding: 2.5rem 3rem;
      border-radius: 1.25rem;
      box-shadow: 0 30px 60px rgba(15, 23, 42, 0.6);
      text-align: center;
      max-width: 420px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.75rem;
    }
    p {
      margin: 0.25rem 0;
      opacity: 0.9;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.15);
      color: #e5e7eb;
      margin-bottom: 1.25rem;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.35);
    }
    .domain {
      font-weight: 600;
      color: #a5b4fc;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">
      <span class="dot"></span>
      <span>Deployed on Railway</span>
    </div>
    <h1>Hello from Twiqit 👋</h1>
    <p>Your static site is live at</p>
    <p class="domain">twiqit.com</p>
  </main>
</body>
</html>
